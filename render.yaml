services:
  - type: web
    name: whataapp-automation
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WHATSAPP_AUTH_MODE
        value: remote
      - key: WHATSAPP_SESSION_COLLECTION
        value: whatsapp_sessions
